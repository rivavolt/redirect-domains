<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirect Domains</title>
    <style>
      body {
        width: 240px;
        padding: 12px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        margin: 0;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 0;
      }
      .row + .row {
        border-top: 1px solid #eee;
      }
      .label {
        color: #555;
      }
      .label .to {
        color: #999;
      }
      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
        margin-left: 8px;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .slider::before {
        content: '';
        position: absolute;
        width: 14px;
        height: 14px;
        left: 3px;
        bottom: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      input:checked + .slider {
        background: #4caf50;
      }
      input:checked + .slider::before {
        transform: translateX(16px);
      }
    </style>
  </head>
  <body>
    <div id="list"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
